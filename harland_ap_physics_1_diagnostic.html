  function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) { screens[i].classList.remove('active'); }
    document.getElementById(id).classList.add('active');
  }

  function initDisplay() {
    document.title = CONFIG.diagnosticTitle + ' | Harland Education';
    document.getElementById('introHeadingEl').textContent  = CONFIG.introHeading;
    document.getElementById('introDescEl').textContent     = CONFIG.introDescription;
    document.getElementById('nameLabelEl').textContent     = CONFIG.nameLabel;
    document.getElementById('nameHintEl').textContent      = CONFIG.nameHint;
    document.getElementById('btnSubmit').textContent       = CONFIG.submitButtonLabel;
    document.getElementById('thankyouTitleEl').textContent = CONFIG.thankyouTitle;
    document.getElementById('thankyouBodyEl').textContent  = CONFIG.thankyouBody;
    document.getElementById('thankyouNextEl').textContent  = CONFIG.thankyouNext;
    var cardEl = document.getElementById('infoCardEl');
    var cardHtml = '';
    for (var i = 0; i < CONFIG.infoPoints.length; i++) {
      cardHtml += '<p><strong>' + (i + 1) + '.</strong> ' + CONFIG.infoPoints[i] + '</p>';
    }
    cardEl.innerHTML = cardHtml;
  }

  document.getElementById('btnStartDiagnostic').onclick = function() {
    var name = document.getElementById('studentName').value.trim();
    if (!name) { document.getElementById('nameError').style.display = 'block'; document.getElementById('studentName').focus(); return; }
    document.getElementById('nameError').style.display = 'none';
    renderQuestions();
    showScreen('screenQuestions');
    document.getElementById('progressWrap').style.display = 'block';
    updateProgress();
    window.scrollTo(0, 0);
  };

  var ANSWERS = {};
  var RANKING_STATE = {};

  function renderQuestions() {
    var container = document.getElementById('questionsContainer');
    var html = '';
    var currentDomain = null;
    var qNum = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      qNum++;
      if (q.domain !== currentDomain) {
        currentDomain = q.domain;
        html += '<div class="domain-header"><div class="domain-label">Section</div><div class="domain-title">' + escHtml(q.domain) + '</div></div>';
      }
      html += '<div class="question-card" id="card_' + escHtml(q.id) + '">';
      html += '<div class="question-number">Question ' + qNum + (q.required || q.type === 'mcq' ? ' <span class="req">*</span>' : '') + '</div>';
      html += '<div class="question-text">' + escHtml(q.text).replace(/\n/g, '<br>') + '</div>';
      if (q.type === 'mcq')          html += renderMcq(q);
      else if (q.type === 'text')    html += renderText(q);
      else if (q.type === 'scale')   html += renderScale(q);
      else if (q.type === 'ranking') html += renderRanking(q);
      html += '</div>';
    }
    container.innerHTML = html;
    attachListeners();
  }

  function renderMcq(q) {
    var letters = ['A','B','C','D','E'];
    var html = '<ul class="mcq-options">';
    for (var i = 0; i < q.options.length; i++) {
      var iid = 'mcq_' + q.id + '_' + i;
      html += '<li><input type="radio" name="mcq_' + escHtml(q.id) + '" id="' + iid + '" value="' + i + '"><label for="' + iid + '"><span class="option-letter">' + letters[i] + '</span>' + escHtml(q.options[i]) + '</label></li>';
    }
    html += '</ul>';
    return html;
  }

  function renderText(q) {
    return '<textarea class="text-response" id="txt_' + escHtml(q.id) + '" placeholder="' + escHtml(q.hint || '') + '" rows="6"></textarea>'
         + '<div class="text-char-count" id="cc_' + escHtml(q.id) + '">0 characters</div>';
  }

  function renderScale(q) {
    var html = '<div class="scale-wrap"><div class="scale-labels"><span>' + escHtml(q.labelLow) + '</span><span>' + escHtml(q.labelHigh) + '</span></div><div class="scale-buttons">';
    for (var v = q.min; v <= q.max; v++) {
      html += '<button type="button" class="scale-btn" data-qid="' + escHtml(q.id) + '" data-val="' + v + '">' + v + '</button>';
    }
    html += '</div></div>';
    return html;
  }

  function renderRanking(q) {
    RANKING_STATE[q.id] = q.items.slice();
    var html = '<p class="rank-hint">Use the arrows to reorder. Top = strongest.</p><ul class="rank-list" id="ranklist_' + escHtml(q.id) + '">';
    for (var i = 0; i < q.items.length; i++) { html += buildRankItem(q.id, i, q.items.length, q.items[i]); }
    html += '</ul>';
    return html;
  }

  function buildRankItem(qid, idx, total, text) {
    var upDis = idx === 0 ? 'disabled' : '';
    var dnDis = idx === total - 1 ? 'disabled' : '';
    return '<li class="rank-item"><div class="rank-position">' + (idx + 1) + '</div><div class="rank-text">' + escHtml(text) + '</div>'
         + '<div class="rank-controls">'
         + '<button type="button" class="rank-btn" ' + upDis + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',-1)">&#9650;</button>'
         + '<button type="button" class="rank-btn" ' + dnDis + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',1)">&#9660;</button>'
         + '</div></li>';
  }

  function moveRankItem(qid, idx, direction) {
    var items = RANKING_STATE[qid];
    var newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= items.length) return;
    var temp = items[idx]; items[idx] = items[newIdx]; items[newIdx] = temp;
    RANKING_STATE[qid] = items;
    var listEl = document.getElementById('ranklist_' + qid);
    var html = '';
    for (var i = 0; i < items.length; i++) { html += buildRankItem(qid, i, items.length, items[i]); }
    listEl.innerHTML = html;
    updateProgress();
  }

  function attachListeners() {
    var radios = document.querySelectorAll('.mcq-options input[type="radio"]');
    for (var i = 0; i < radios.length; i++) {
      radios[i].onchange = function() { ANSWERS[this.name.replace('mcq_', '')] = parseInt(this.value, 10); updateProgress(); };
    }
    var textareas = document.querySelectorAll('.text-response');
    for (var j = 0; j < textareas.length; j++) {
      (function(ta) {
        var qid = ta.id.replace('txt_', '');
        ta.oninput = function() {
          ANSWERS[qid] = ta.value;
          var cc = document.getElementById('cc_' + qid);
          if (cc) cc.textContent = ta.value.length + ' characters';
          updateProgress();
        };
      })(textareas[j]);
    }
    var scaleBtns = document.querySelectorAll('.scale-btn');
    for (var k = 0; k < scaleBtns.length; k++) {
      scaleBtns[k].onclick = function() {
        var qid = this.getAttribute('data-qid');
        var val = parseInt(this.getAttribute('data-val'), 10);
        ANSWERS[qid] = val;
        var siblings = document.querySelectorAll('.scale-btn[data-qid="' + qid + '"]');
        for (var s = 0; s < siblings.length; s++) { siblings[s].classList.remove('selected'); }
        this.classList.add('selected');
        updateProgress();
      };
    }
  }

  function countRequired() {
    var total = 0; var answered = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (!q.required && q.type !== 'mcq') continue;
      total++;
      if (q.type === 'mcq' && typeof ANSWERS[q.id] !== 'undefined') answered++;
      else if (q.type === 'text' && ANSWERS[q.id] && ANSWERS[q.id].length >= 1) answered++;
      else if (q.type === 'scale' && typeof ANSWERS[q.id] !== 'undefined') answered++;
      else if (q.type === 'ranking') answered++;
    }
    return { total: total, answered: answered };
  }

  function updateProgress() {
    var counts = countRequired();
    var pct = counts.total > 0 ? Math.round((counts.answered / counts.total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = counts.answered + ' of ' + counts.total + ' required questions answered';
  }

  function validate() {
    var missing = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (q.type === 'mcq') { if (typeof ANSWERS[q.id] === 'undefined') missing.push(q.id); }
      else if (q.type === 'text' && q.required) { var v = ANSWERS[q.id] || ''; if (v.length < 1) missing.push(q.id); }
      else if (q.type === 'scale' && q.required) { if (typeof ANSWERS[q.id] === 'undefined') missing.push(q.id); }
    }
    return missing;
  }

  function highlightMissing(missingIds) {
    var allCards = document.querySelectorAll('.question-card');
    for (var i = 0; i < allCards.length; i++) { allCards[i].style.borderColor = ''; }
    for (var j = 0; j < missingIds.length; j++) { var card = document.getElementById('card_' + missingIds[j]); if (card) card.style.borderColor = '#C0392B'; }
    if (missingIds.length > 0) { var first = document.getElementById('card_' + missingIds[0]); if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }

  function collectPayload() {
    var studentName = document.getElementById('studentName').value.trim();
    var mcqScores = {}; var selfRatings = {}; var preferences = {}; var rawResponses = {};
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (q.type === 'mcq') {
        var chosen = ANSWERS[q.id];
        mcqScores[q.id] = { chosen: chosen, answer: q.answer, correct: (q.answer !== null && q.answer !== undefined) ? (chosen === q.answer) : null };
        rawResponses[q.id] = chosen;
      } else if (q.type === 'text') {
        rawResponses[q.id] = ANSWERS[q.id] || '';
      } else if (q.type === 'scale') {
        selfRatings[q.id] = ANSWERS[q.id];
        rawResponses[q.id] = ANSWERS[q.id];
      } else if (q.type === 'ranking') {
        var order = RANKING_STATE[q.id] || [];
        preferences[q.id] = order;
        rawResponses[q.id] = order;
      }
    }
    return {
      student_id: STUDENT_ID, student_name: studentName,
      diagnostic_type: DIAGNOSTIC_TYPE, diagnostic_label: DIAGNOSTIC_LABEL,
      raw_responses: rawResponses, mcq_scores: mcqScores,
      self_ratings: selfRatings, preferences: preferences
    };
  }

  function submitToSupabase(payload, onSuccess, onError) {
    var headers = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Prefer': 'return=representation' };
    fetch(SB_URL + '/rest/v1/diagnostics', { method: 'POST', headers: headers, body: JSON.stringify(payload) })
    .then(function(res) { if (!res.ok) throw new Error('Insert failed: ' + res.status); return res.json(); })
    .then(function(data) {
      var reportPayload = {
        diagnostic_id: data[0].id,
        student_id: payload.student_id,
        student_name: payload.student_name,
        diagnostic_label: payload.diagnostic_label,
        ai_report: 'Pending HT review',
        status: 'pending'
      };
      return fetch(SB_URL + '/rest/v1/reports', { method: 'POST', headers: headers, body: JSON.stringify(reportPayload) });
    })
    .then(function(res) { if (!res.ok) throw new Error('Report insert failed: ' + res.status); onSuccess(); })
    .catch(function(err) { onError(err); });
  }

  document.getElementById('btnSubmit').onclick = function() {
    var missingIds = validate();
    if (missingIds.length > 0) { document.getElementById('submitError').style.display = 'block'; highlightMissing(missingIds); return; }
    document.getElementById('submitError').style.display = 'none';
    var btn = document.getElementById('btnSubmit');
    btn.disabled = true; btn.textContent = 'Submitting...';
    submitToSupabase(collectPayload(),
      function() { document.getElementById('progressWrap').style.display = 'none'; showScreen('screenThankYou'); window.scrollTo(0, 0); },
      function(err) { btn.disabled = false; btn.textContent = CONFIG.submitButtonLabel; var errBox = document.getElementById('submitError'); errBox.style.display = 'block'; errBox.textContent = 'Submission failed. Please check your connection and try again. Error: ' + err.message; }
    );
  };

  function escHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  initDisplay();
</script>
</body>
</html>
