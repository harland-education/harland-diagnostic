<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
  ============================================================
  HARLAND EDUCATION -- DIAGNOSTIC TEMPLATE
  Version: 1.0
  Last Updated: 2025

  HOW TO USE THIS TEMPLATE
  ============================================================
  1. Edit the CONFIG section below (lines marked CONFIGURE)
  2. Edit the QUESTIONS array to add your questions
  3. Save as a new file, e.g. harland_sat_readiness.html
  4. Upload to GitHub and share the Pages link with the student

  QUESTION TYPES SUPPORTED:
    "mcq"     -- Multiple choice, one correct answer, auto-scored
    "text"    -- Open-ended written response
    "scale"   -- Self-rating slider (1 to N)
    "ranking" -- Student ranks a list of items by clicking arrows

  ES5 ONLY -- Do not use: const, let, arrow functions =>,
  template literals ``, async/await, or unicode characters
  in JavaScript strings (no em dashes, arrows, subscripts).
  ============================================================
  -->
  <title>IELTS Academic Diagnostic | Harland Education</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;700&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --obsidian:#0D0D0F; --ink:#1A1A1F; --slate:#4A4A56; --mist:#9A9AA8;
      --gold:#C9A84C; --gold-light:#E8C97A; --gold-dark:#A07820; --gold-pale:#F5EDDA;
      --cream:#F8F5EF; --cream-warm:#FAF7F0; --cream-deep:#F2EDE0; --card:#FFFEF9;
      --border-soft:#E8E4DC; --white:#FFFFFF;
      --success:#3B6D11; --success-wash:#EAF3DE;
      --error:#A32D2D; --error-wash:#FCEBEB;
      --warning:#854F0B; --warning-wash:#FAEEDA;
      --font-display:'Cormorant Garamond','Noto Serif TC',serif;
      --font-body:'DM Sans','Noto Sans TC',sans-serif;
      --font-mono:'SF Mono',Menlo,Consolas,monospace;
      --grey:var(--slate);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      background: var(--cream); color: var(--ink);
      font-family: var(--font-body); font-size: 16px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* MASTHEAD (bounded obsidian band) */
    .site-header {
      background: var(--obsidian); border-bottom: 1px solid var(--gold);
      padding: 18px 40px; display: flex; align-items: center; gap: 18px;
    }
    .site-header .brand-logo { height: 44px; width: auto; display: block; }
    .site-header .brand-eyebrow {
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light);
      margin: 0; padding-left: 18px; border-left: 1px solid rgba(201,168,76,0.4); line-height: 1.3;
    }

    /* PROGRESS */
    .progress-bar-wrap {
      position: sticky; top: 0; z-index: 20; background: var(--cream-warm);
      border-bottom: 1px solid var(--border-soft); padding: 14px 40px;
    }
    .progress-track { height: 4px; background: var(--cream-deep); overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }
    .progress-label {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--slate); margin-top: 8px;
    }

    /* LAYOUT */
    .main-wrap { max-width: 760px; margin: 0 auto; padding: 56px 24px 80px; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* INTRO */
    .name-screen-title {
      font-family: var(--font-display); font-weight: 400; font-size: 46px;
      line-height: 1.1; letter-spacing: -0.015em; color: var(--obsidian); margin: 0 0 20px;
    }
    .name-screen-desc {
      font-family: var(--font-body); font-weight: 300; font-size: 18px; line-height: 1.6;
      color: var(--slate); letter-spacing: 0.01em; margin: 0 0 32px;
    }
    .info-card {
      background: var(--card); border: 1px solid var(--border-soft);
      border-left: 3px solid var(--gold); padding: 24px 28px; margin: 0 0 36px;
    }
    .info-card p { margin: 0 0 12px; font-size: 15px; color: var(--ink); line-height: 1.55; }
    .info-card p:last-child { margin: 0; }
    .info-card strong { color: var(--gold-dark); font-weight: 500; }
    .field-label {
      display: block; font-family: var(--font-body); font-size: 11px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--slate); margin: 0 0 10px;
    }
    .field-input {
      width: 100%; font-family: var(--font-body); font-size: 16px; color: var(--ink);
      background: var(--white); border: 1px solid var(--border-soft); border-radius: 0;
      padding: 14px 16px; outline: none; transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--gold); }
    .field-error, .submit-error {
      display: none; color: var(--error); font-size: 14px; background: var(--error-wash);
      border-left: 3px solid var(--error); padding: 10px 14px; margin-top: 12px;
    }

    /* BUTTONS */
    .btn-primary {
      display: inline-block; background: var(--gold); color: var(--obsidian);
      font-family: var(--font-body); font-size: 15px; font-weight: 500; letter-spacing: 0.04em;
      padding: 16px 40px; border: none; border-radius: 0; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:disabled { background: var(--mist); color: var(--cream-warm); cursor: default; }
    .btn-row { margin-top: 36px; }

    /* QUESTIONS */
    .required-note { font-size: 13px; color: var(--slate); margin: 0 0 28px; }
    .req { color: var(--gold-dark); font-weight: 700; }
    .domain-header { margin: 44px 0 22px; }
    .domain-header:first-child { margin-top: 0; }
    .domain-label {
      font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold-dark); margin: 0 0 8px;
    }
    .domain-title {
      font-family: var(--font-display); font-weight: 400; font-size: 30px; line-height: 1.15;
      letter-spacing: -0.01em; color: var(--obsidian); margin: 0; padding-bottom: 14px;
      border-bottom: 1px solid var(--gold);
    }
    .question-card {
      background: var(--card); border: 1px solid var(--border-soft); padding: 26px 28px; margin: 0 0 18px;
    }
    .question-number {
      font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--slate); margin: 0 0 12px;
    }
    .question-text { font-size: 16px; line-height: 1.6; color: var(--ink); margin: 0 0 18px; }
    .question-hint { font-size: 14px; color: var(--slate); font-style: italic; margin: 0 0 14px; }

    /* PASSAGE / TRANSCRIPT */
    .passage-box {
      background: var(--cream-warm); border: 1px solid var(--border-soft);
      border-left: 3px solid var(--gold); border-radius: 0; padding: 18px 20px; margin: 0 0 20px;
      font-size: 15px; line-height: 1.65; color: var(--ink); max-height: 400px; overflow-y: auto;
    }
    .passage-box p { margin: 0 0 0.85em; }
    .passage-box p:last-child { margin: 0; }
    .passage-box p:first-child {
      font-family: var(--font-display); font-weight: 500; font-size: 19px; color: var(--obsidian);
    }

    /* MCQ */
    .mcq-options { list-style: none; margin: 0; padding: 0; }
    .mcq-options li { margin: 0 0 10px; position: relative; }
    .mcq-options input { position: absolute; opacity: 0; left: 0; top: 0; }
    .mcq-options label {
      display: flex; align-items: flex-start; gap: 14px; cursor: pointer; padding: 13px 16px;
      background: var(--white); border: 1px solid var(--border-soft); transition: all 0.12s;
      font-size: 15px; color: var(--ink); line-height: 1.5;
    }
    .mcq-options label:hover { border-color: var(--gold); background: var(--cream-warm); }
    .mcq-options input:checked + label { background: var(--gold-pale); border-color: var(--gold); }
    .option-letter {
      flex: 0 0 auto; width: 24px; height: 24px; line-height: 24px; text-align: center;
      font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--slate);
      background: var(--cream-deep); border-radius: 50%;
    }
    .mcq-options input:checked + label .option-letter { background: var(--gold); color: var(--obsidian); }

    /* SCALE */
    .scale-wrap { margin: 4px 0 0; }
    .scale-labels {
      display: flex; justify-content: space-between; font-size: 12px; color: var(--slate);
      margin-bottom: 10px; letter-spacing: 0.02em;
    }
    .scale-buttons { display: flex; gap: 10px; }
    .scale-btn {
      flex: 1; min-width: 0; padding: 14px 0; font-family: var(--font-body); font-size: 16px;
      color: var(--slate); background: var(--white); border: 1px solid var(--border-soft);
      border-radius: 0; cursor: pointer; transition: all 0.12s;
    }
    .scale-btn:hover { border-color: var(--gold); }
    .scale-btn.selected { background: var(--gold-pale); border-color: var(--gold); color: var(--gold-dark); font-weight: 500; }

    /* TEXT RESPONSE */
    .text-response {
      width: 100%; min-height: 150px; font-family: var(--font-body); font-size: 15px; line-height: 1.6;
      color: var(--ink); background: var(--white); border: 1px solid var(--border-soft); border-radius: 0;
      padding: 14px 16px; outline: none; resize: vertical; transition: border-color 0.15s;
    }
    .text-response:focus { border-color: var(--gold); }
    .text-char-count { font-size: 12px; color: var(--mist); margin-top: 8px; }

    /* RANKING (template completeness) */
    .rank-hint { font-size: 14px; color: var(--slate); margin: 0 0 12px; }
    .rank-list { list-style: none; margin: 0; padding: 0; }
    .rank-item {
      display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--white);
      border: 1px solid var(--border-soft); margin-bottom: 8px;
    }
    .rank-position {
      flex: 0 0 auto; width: 24px; height: 24px; line-height: 24px; text-align: center;
      font-size: 12px; font-weight: 500; color: var(--obsidian); background: var(--gold-pale); border-radius: 50%;
    }
    .rank-text { flex: 1; font-size: 15px; color: var(--ink); }
    .rank-controls { display: flex; gap: 6px; }
    .rank-btn {
      width: 30px; height: 30px; border: 1px solid var(--border-soft); background: var(--white);
      color: var(--slate); cursor: pointer; border-radius: 0;
    }
    .rank-btn:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* THANK YOU */
    .thankyou-wrap { text-align: center; padding: 40px 0; }
    .thankyou-icon {
      width: 64px; height: 64px; margin: 0 auto 28px; display: flex; align-items: center;
      justify-content: center; border: 1px solid var(--gold); border-radius: 50%;
    }
    .thankyou-icon svg { width: 30px; height: 30px; }
    .thankyou-title {
      font-family: var(--font-display); font-weight: 400; font-size: 40px; line-height: 1.15;
      letter-spacing: -0.01em; color: var(--obsidian); margin: 0 0 18px;
    }
    .thankyou-body { font-size: 17px; line-height: 1.65; color: var(--slate); max-width: 520px; margin: 0 auto 28px; }
    .thankyou-divider { width: 60px; height: 1px; background: var(--gold); margin: 0 auto 24px; }
    .thankyou-next { font-size: 14px; color: var(--mist); letter-spacing: 0.04em; }

    /* FOOTER */
    .site-footer {
      text-align: center; font-size: 12px; letter-spacing: 0.08em; color: var(--slate);
      padding: 32px 24px; border-top: 1px solid var(--border-soft); background: var(--cream-warm);
    }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .site-header { padding: 14px 20px; gap: 12px; }
      .site-header .brand-logo { height: 36px; }
      .site-header .brand-eyebrow { display: none; }
      .progress-bar-wrap { padding: 12px 20px; }
      .main-wrap { padding: 36px 18px 64px; }
      .name-screen-title { font-size: 34px; }
      .domain-title { font-size: 25px; }
      .thankyou-title { font-size: 32px; }
      .scale-buttons { gap: 6px; }
      .scale-btn { padding: 12px 0; font-size: 15px; }
    }
    /* IELTS audio listening player */
    .audio-player { background: var(--obsidian); padding: 22px 24px; margin: 0 0 22px; }
    .audio-intro { color: var(--gold-light); font-size: 14px; line-height: 1.55; margin: 0 0 16px; }
    .audio-controls { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .audio-btn { background: var(--gold); color: var(--obsidian); border: none; border-radius: 0; font-family: var(--font-body); font-size: 14px; font-weight: 500; letter-spacing: 0.04em; padding: 12px 26px; cursor: pointer; transition: background 0.15s; }
    .audio-btn:hover:not(:disabled) { background: var(--gold-light); }
    .audio-btn:disabled { background: var(--slate); color: var(--cream-warm); cursor: default; }
    .audio-status { color: var(--mist); font-size: 13px; letter-spacing: 0.04em; }
  </style>
</head>

<!-- ===== MAIN SCRIPT (ES5 ONLY) ===== -->
<script>

  /* ==========================================================
     UTILITY: show/hide screens
     ========================================================== */
  function showScreen(screenId) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) {
      screens[i].classList.remove('active');
    }
    document.getElementById(screenId).classList.add('active');
  }

  /* ==========================================================
     INITIALISE: populate text from CONFIG
     ========================================================== */
  function initDisplay() {
    document.title = CONFIG.diagnosticTitle + ' | Harland Education';
    document.getElementById('introHeadingEl').textContent  = CONFIG.introHeading;
    document.getElementById('introDescEl').textContent     = CONFIG.introDescription;
    document.getElementById('nameLabelEl').textContent     = CONFIG.nameLabel;
    document.getElementById('nameHintEl').textContent      = CONFIG.nameHint;
    document.getElementById('btnSubmit').textContent       = CONFIG.submitButtonLabel;
    document.getElementById('thankyouTitleEl').textContent = CONFIG.thankyouTitle;
    document.getElementById('thankyouBodyEl').textContent  = CONFIG.thankyouBody;
    document.getElementById('thankyouNextEl').textContent  = CONFIG.thankyouNext;

    /* Info card bullet points */
    var cardEl = document.getElementById('infoCardEl');
    var cardHtml = '';
    for (var i = 0; i < CONFIG.infoPoints.length; i++) {
      cardHtml += '<p><strong>' + (i + 1) + '.</strong> ' + CONFIG.infoPoints[i] + '</p>';
    }
    cardEl.innerHTML = cardHtml;
  }

  /* ==========================================================
     NAME SCREEN: start button handler
     ========================================================== */
  document.getElementById('btnStartDiagnostic').onclick = function() {
    var name = document.getElementById('studentName').value.trim();
    if (!name) {
      document.getElementById('nameError').style.display = 'block';
      document.getElementById('studentName').focus();
      return;
    }
    document.getElementById('nameError').style.display = 'none';
    renderQuestions();
    showScreen('screenQuestions');
    document.getElementById('progressWrap').style.display = 'block';
    updateProgress();
    window.scrollTo(0, 0);
  };

  /* ==========================================================
     RENDER QUESTIONS
     Reads the QUESTIONS array and builds the question cards.
     ========================================================== */

  /* State object -- stores student answers keyed by question id */
  var ANSWERS = {};

  /* Track current ranking order for ranking questions */
  var RANKING_STATE = {};

  function renderQuestions() {
    var container = document.getElementById('questionsContainer');
    var html = '';
    var currentDomain = null;
    var qNum = 0;

    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      qNum++;

      /* Domain header -- only emit when domain changes */
      if (q.domain !== currentDomain) {
        currentDomain = q.domain;
        html += '<div class="domain-header">'
              + '<div class="domain-label">Section</div>'
              + '<div class="domain-title">' + escHtml(q.domain) + '</div>'
              + '</div>';
      }

      /* Question card open */
      html += '<div class="question-card" id="card_' + escHtml(q.id) + '">';
      html += '<div class="question-number">Question ' + qNum + (q.required ? ' <span class="req">*</span>' : '') + '</div>';
      if (q.passage) {
        html += '<div class="passage-box">' + formatPassage(q.passage) + '</div>';
      }
      if (q.audio) {
        html += renderAudioPlayer(q.audio);
      }
      html += '<div class="question-text">' + escHtml(q.text).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>') + '</div>';

      /* Render by type */
      if (q.type === 'mcq') {
        html += renderMcq(q);
      } else if (q.type === 'text') {
        html += renderText(q);
      } else if (q.type === 'scale') {
        html += renderScale(q);
      } else if (q.type === 'ranking') {
        html += renderRanking(q);
      }

      html += '</div>'; /* close question-card */
    }

    container.innerHTML = html;

    /* Attach event listeners after DOM is built */
    attachListeners();
  }

  /* --- MCQ --- */
  function renderMcq(q) {
    var letters = ['A', 'B', 'C', 'D', 'E', 'F'];
    var html = '<ul class="mcq-options">';
    for (var i = 0; i < q.options.length; i++) {
      var inputId = 'mcq_' + q.id + '_' + i;
      html += '<li>'
            + '<input type="radio" name="mcq_' + escHtml(q.id) + '" id="' + inputId + '" value="' + i + '">'
            + '<label for="' + inputId + '">'
            + '<span class="option-letter">' + letters[i] + '</span>'
            + escHtml(q.options[i])
            + '</label>'
            + '</li>';
    }
    html += '</ul>';
    return html;
  }

  /* --- OPEN TEXT --- */
  function renderText(q) {
    var hint = q.hint ? escHtml(q.hint) : '';
    var html = '<textarea class="text-response" id="txt_' + escHtml(q.id) + '"'
             + ' placeholder="' + hint + '"'
             + ' rows="5"></textarea>'
             + '<div class="text-char-count" id="cc_' + escHtml(q.id) + '">0 characters</div>';
    return html;
  }

  /* --- SCALE --- */
  function renderScale(q) {
    var html = '<div class="scale-wrap">'
             + '<div class="scale-labels">'
             + '<span>' + escHtml(q.labelLow) + '</span>'
             + '<span>' + escHtml(q.labelHigh) + '</span>'
             + '</div>'
             + '<div class="scale-buttons">';
    for (var v = q.min; v <= q.max; v++) {
      html += '<button type="button" class="scale-btn" data-qid="' + escHtml(q.id) + '" data-val="' + v + '">' + v + '</button>';
    }
    html += '</div></div>';
    return html;
  }

  /* --- RANKING --- */
  function renderRanking(q) {
    /* Initialise state with original order */
    RANKING_STATE[q.id] = q.items.slice();
    var html = '<p class="rank-hint">Use the arrows to reorder. Top = most preferred.</p>'
             + '<ul class="rank-list" id="ranklist_' + escHtml(q.id) + '">';
    for (var i = 0; i < q.items.length; i++) {
      html += buildRankItem(q.id, i, q.items.length, q.items[i]);
    }
    html += '</ul>';
    return html;
  }

  function buildRankItem(qid, idx, total, text) {
    var upDisabled   = (idx === 0)         ? 'disabled' : '';
    var downDisabled = (idx === total - 1)  ? 'disabled' : '';
    return '<li class="rank-item" id="rankitem_' + escHtml(qid) + '_' + idx + '">'
         + '<div class="rank-position">' + (idx + 1) + '</div>'
         + '<div class="rank-text">' + escHtml(text) + '</div>'
         + '<div class="rank-controls">'
         + '<button type="button" class="rank-btn" ' + upDisabled + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',-1)" title="Move up">&#9650;</button>'
         + '<button type="button" class="rank-btn" ' + downDisabled + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',1)" title="Move down">&#9660;</button>'
         + '</div>'
         + '</li>';
  }

  /* Move a ranking item up or down by direction (-1 or +1) */
  function moveRankItem(qid, idx, direction) {
    var items = RANKING_STATE[qid];
    var newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= items.length) return;

    /* Swap */
    var temp = items[idx];
    items[idx] = items[newIdx];
    items[newIdx] = temp;
    RANKING_STATE[qid] = items;

    /* Re-render the list */
    var listEl = document.getElementById('ranklist_' + qid);
    var html = '';
    for (var i = 0; i < items.length; i++) {
      html += buildRankItem(qid, i, items.length, items[i]);
    }
    listEl.innerHTML = html;
    updateProgress();
  }

  /* ==========================================================
     ATTACH EVENT LISTENERS
     Called once after renderQuestions builds the DOM.
     ========================================================== */
  function attachListeners() {
    /* MCQ -- radio buttons */
    var radios = document.querySelectorAll('.mcq-options input[type="radio"]');
    for (var i = 0; i < radios.length; i++) {
      radios[i].onchange = function() {
        ANSWERS[this.name.replace('mcq_', '')] = parseInt(this.value, 10);
        updateProgress();
      };
    }

    /* Text -- textareas */
    var textareas = document.querySelectorAll('.text-response');
    for (var j = 0; j < textareas.length; j++) {
      (function(ta) {
        var qid = ta.id.replace('txt_', '');
        ta.oninput = function() {
          ANSWERS[qid] = ta.value;
          var cc = document.getElementById('cc_' + qid);
          if (cc) cc.textContent = ta.value.length + ' characters';
          updateProgress();
        };
      })(textareas[j]);
    }

    /* Scale -- buttons */
    var scaleBtns = document.querySelectorAll('.scale-btn');
    for (var k = 0; k < scaleBtns.length; k++) {
      scaleBtns[k].onclick = function() {
        var qid = this.getAttribute('data-qid');
        var val = parseInt(this.getAttribute('data-val'), 10);
        ANSWERS[qid] = val;
        /* Update selected state */
        var siblings = document.querySelectorAll('.scale-btn[data-qid="' + qid + '"]');
        for (var s = 0; s < siblings.length; s++) {
          siblings[s].classList.remove('selected');
        }
        this.classList.add('selected');
        updateProgress();
      };
    }

    /* Listening -- audio player (max 2 plays) */
    var audioEl = document.getElementById('ieltsAudio');
    var audioBtn = document.getElementById('audioPlayBtn');
    var audioStatus = document.getElementById('audioStatus');
    if (audioEl && audioBtn) {
      var playsLeft = 2;
      audioBtn.onclick = function() {
        if (playsLeft <= 0) return;
        audioBtn.disabled = true;
        audioStatus.textContent = 'Playing...';
        var pr = audioEl.play();
        if (pr && pr['catch']) { pr['catch'](function() { audioBtn.disabled = false; audioStatus.textContent = 'Tap Play to start'; }); }
      };
      audioEl.onended = function() {
        playsLeft--;
        if (playsLeft > 0) { audioBtn.disabled = false; audioStatus.textContent = playsLeft + ' play remaining'; }
        else { audioBtn.disabled = true; audioStatus.textContent = 'No plays remaining'; }
      };
    }
  }

  /* ==========================================================
     PROGRESS BAR
     Counts how many required questions have been answered.
     ========================================================== */
  function countRequired() {
    var total = 0;
    var answered = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (!q.required && q.type !== 'mcq') continue;
      /* MCQ questions are always counted */
      total++;
      if (q.type === 'mcq' && typeof ANSWERS[q.id] !== 'undefined') answered++;
      else if (q.type === 'text' && ANSWERS[q.id] && ANSWERS[q.id].length >= (q.minLength || 0)) answered++;
      else if (q.type === 'scale' && typeof ANSWERS[q.id] !== 'undefined') answered++;
      else if (q.type === 'ranking') answered++; /* Always has a ranking */
    }
    return { total: total, answered: answered };
  }

  function updateProgress() {
    var counts = countRequired();
    var pct = counts.total > 0 ? Math.round((counts.answered / counts.total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = counts.answered + ' of ' + counts.total + ' required questions answered';
  }

  /* ==========================================================
     VALIDATION
     Returns array of question IDs that are required but unanswered.
     ========================================================== */
  function validate() {
    var missing = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];

      if (q.type === 'mcq') {
        if (typeof ANSWERS[q.id] === 'undefined') missing.push(q.id);

      } else if (q.type === 'text' && q.required) {
        var val = ANSWERS[q.id] || '';
        if (val.length < (q.minLength || 1)) missing.push(q.id);

      } else if (q.type === 'scale' && q.required) {
        if (typeof ANSWERS[q.id] === 'undefined') missing.push(q.id);

      } else if (q.type === 'ranking' && q.required) {
        /* Ranking always has a value, skip */
      }
    }
    return missing;
  }

  /* Highlight missing questions */
  function highlightMissing(missingIds) {
    /* Clear previous highlights */
    var allCards = document.querySelectorAll('.question-card');
    for (var i = 0; i < allCards.length; i++) {
      allCards[i].style.borderColor = '';
    }
    for (var j = 0; j < missingIds.length; j++) {
      var card = document.getElementById('card_' + missingIds[j]);
      if (card) card.style.borderColor = '#C0392B';
    }
    /* Scroll to first missing */
    if (missingIds.length > 0) {
      var first = document.getElementById('card_' + missingIds[0]);
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  /* ==========================================================
     COLLECT FINAL ANSWERS
     Assembles the payload for Supabase.
     ========================================================== */
  /* ==========================================================
     IELTS BAND ENGINE
     Reading is the objective signal. Writing and Speaking are
     teacher-assessed against the IELTS band descriptors, and
     Listening needs the full audio test. The transcript items
     are a rough screen only and are not folded into the band.
     ========================================================== */
  function renderAudioPlayer(src) {
    return '<div class="audio-player">'
      + '<div class="audio-intro">Listen to the recording and answer the questions below as you listen. You may play it a maximum of two times. In the real IELTS test the audio plays once. Please check your sound now.</div>'
      + '<audio id="ieltsAudio" preload="auto" src="' + escHtml(src) + '"></audio>'
      + '<div class="audio-controls">'
      + '<button type="button" id="audioPlayBtn" class="audio-btn">Play recording</button>'
      + '<span id="audioStatus" class="audio-status">2 plays remaining</span>'
      + '</div></div>';
  }

  function formatPassage(str) {
    var parts = String(str).split('\n\n');
    var out = '';
    for (var i = 0; i < parts.length; i++) {
      out += '<p>' + escHtml(parts[i]).replace(/\n/g, '<br>') + '</p>';
    }
    return out;
  }

  function ieltsReadingBand(acc) {
    if (acc >= 0.85) return 8.0;
    if (acc >= 0.75) return 7.5;
    if (acc >= 0.65) return 7.0;
    if (acc >= 0.55) return 6.5;
    if (acc >= 0.45) return 6.0;
    if (acc >= 0.35) return 5.5;
    if (acc >= 0.25) return 5.0;
    if (acc >= 0.15) return 4.5;
    return 4.0;
  }

  function ieltsListeningBand(acc) {
    if (acc >= 0.90) return 8.0;
    if (acc >= 0.78) return 7.5;
    if (acc >= 0.66) return 7.0;
    if (acc >= 0.54) return 6.5;
    if (acc >= 0.42) return 6.0;
    if (acc >= 0.30) return 5.5;
    if (acc >= 0.18) return 5.0;
    return 4.5;
  }

  function computeIeltsAnalysis(mcqScores) {
    var rCorrect = 0, rTotal = 0, lCorrect = 0, lTotal = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (q.type !== 'mcq' || q.answer === null || q.answer === undefined) continue;
      var sc = mcqScores[q.id];
      var ok = !!(sc && sc.correct === true);
      if (q.domain.indexOf('Reading') === 0) { rTotal++; if (ok) rCorrect++; }
      else if (q.domain === 'Listening') { lTotal++; if (ok) lCorrect++; }
    }
    var rAcc = rTotal ? (rCorrect / rTotal) : 0;
    var lAcc = lTotal ? (lCorrect / lTotal) : 0;
    var band = ieltsReadingBand(rAcc);
    var lBand = ieltsListeningBand(lAcc);
    var objAvg = Math.round(((band + lBand) / 2) * 2) / 2;
    var topts = ['5.5 or below', '6.0', '6.5', '7.0', '7.5 or above'];
    var tIdx = ANSWERS['p_target'];
    var targetText = (typeof tIdx === 'number' && topts[tIdx]) ? topts[tIdx] : null;
    return {
      reading_band: band,
      reading_raw: rCorrect + '/' + rTotal,
      reading_accuracy: Math.round(rAcc * 100) / 100,
      listening_band: lBand,
      listening_raw: lCorrect + '/' + lTotal,
      listening_accuracy: Math.round(lAcc * 100) / 100,
      objective_overall_band: objAvg,
      target_band: targetText,
      self_ratings: {
        reading: (typeof ANSWERS['sa_reading'] === 'number') ? ANSWERS['sa_reading'] : null,
        listening: (typeof ANSWERS['sa_listening'] === 'number') ? ANSWERS['sa_listening'] : null,
        writing: (typeof ANSWERS['sa_writing'] === 'number') ? ANSWERS['sa_writing'] : null,
        speaking: (typeof ANSWERS['sa_speaking'] === 'number') ? ANSWERS['sa_speaking'] : null
      },
      note: 'Reading and Listening bands are indicative estimates from short screening sets, not official scores. Writing and Speaking are assessed by the teacher against the IELTS band descriptors.'
    };
  }

  function buildResult(submissionId, payload) {
    var a = (payload.preferences && payload.preferences.ielts_analysis) || {};
    var band = (typeof a.reading_band === 'number') ? a.reading_band : null;
    function tierForBand(b) {
      if (b === null) return 'Pending';
      if (b >= 7.0) return 'Proficient (CEFR C1-C2)';
      if (b >= 5.5) return 'Developing (CEFR B2)';
      return 'Foundation (CEFR B1)';
    }
    var rParts = (a.reading_raw || '0/0').split('/');
    var lBand = (typeof a.listening_band === 'number') ? a.listening_band : null;
    var lParts = (a.listening_raw || '0/0').split('/');
    var objOverall = (typeof a.objective_overall_band === 'number') ? a.objective_overall_band : null;
    var breakdown = [
      { strand: 'Reading', raw_score: parseInt(rParts[0], 10) || 0, max_score: parseInt(rParts[1], 10) || 0, indicated_level: (band !== null ? ('Band ' + band.toFixed(1)) : 'Not scored') },
      { strand: 'Listening', raw_score: parseInt(lParts[0], 10) || 0, max_score: parseInt(lParts[1], 10) || 0, indicated_level: (lBand !== null ? ('Band ' + lBand.toFixed(1)) : 'Not scored') },
      { strand: 'Writing', raw_score: null, max_score: null, indicated_level: 'Pending teacher assessment' },
      { strand: 'Speaking', raw_score: null, max_score: null, indicated_level: 'Pending live assessment' }
    ];
    var flags = [];
    if (band !== null) flags.push('reading_indicative_band: ' + band.toFixed(1));
    if (lBand !== null) flags.push('listening_indicative_band: ' + lBand.toFixed(1));
    if (objOverall !== null) flags.push('objective_overall_band_reading_listening: ' + objOverall.toFixed(1));
    if (a.target_band) flags.push('target_band: ' + a.target_band);
    flags.push('writing_and_speaking_pending_teacher_assessment');
    var levelStr = (band !== null ? ('Reading Band ' + band.toFixed(1)) : 'Reading pending') + (lBand !== null ? (', Listening Band ' + lBand.toFixed(1)) : '');
    return {
      submission_id: submissionId,
      student_id: payload.student_id,
      diagnostic_id: DIAGNOSTIC_SLUG,
      assessment_type: 'diagnostic',
      subject: 'ielts_academic',
      recommended_course: 'IELTS Academic preparation',
      recommended_level: levelStr,
      recommended_tier: tierForBand(objOverall !== null ? objOverall : band),
      starting_unit: null,
      confidence: 'low',
      breakdown: breakdown,
      flags: flags,
      computed_by: 'engine',
      status: 'computed',
      schema_version: '1.0'
    };
  }

  function collectPayload() {
    var studentName = document.getElementById('studentName').value.trim();
    var mcqScores   = {};
    var selfRatings = {};
    var preferences = {};
    var rawResponses = {};

    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];

      if (q.type === 'mcq') {
        var chosen = ANSWERS[q.id];
        var correct = (q.answer !== null && q.answer !== undefined) ? (chosen === q.answer) : null;
        mcqScores[q.id] = {
          chosen:  chosen,
          answer:  q.answer,
          correct: correct
        };
        rawResponses[q.id] = chosen;

      } else if (q.type === 'text') {
        rawResponses[q.id] = ANSWERS[q.id] || '';

      } else if (q.type === 'scale') {
        selfRatings[q.id] = ANSWERS[q.id];
        rawResponses[q.id] = ANSWERS[q.id];

      } else if (q.type === 'ranking') {
        var order = RANKING_STATE[q.id] || [];
        preferences[q.id] = order;
        rawResponses[q.id] = order;
      }
    }

    preferences.ielts_analysis = computeIeltsAnalysis(mcqScores);

    return {
      student_id:        STUDENT_ID,
      student_name:      studentName,
      diagnostic_type:   DIAGNOSTIC_TYPE,
      diagnostic_label:  DIAGNOSTIC_LABEL,
      diagnostic_id:     DIAGNOSTIC_SLUG,
      assessment_type:   'diagnostic',
      raw_responses:     rawResponses,
      mcq_scores:        mcqScores,
      self_ratings:      selfRatings,
      preferences:       preferences
    };
  }

  /* ==========================================================
     SUPABASE SUBMIT
     Posts to the diagnostics table, then creates a pending report.
     ========================================================== */
  function submitToSupabase(payload, onSuccess, onError) {
    var headers = {
      'Content-Type':  'application/json',
      'apikey':        SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer':        'return=representation'
    };

    /* Three-step: diagnostics (submission) -> results (band estimate) -> reports (pending).
       The results step is best-effort, so a results error never blocks the student. */
    fetch(SB_URL + '/rest/v1/diagnostics', {
      method:  'POST',
      headers: headers,
      body:    JSON.stringify(payload)
    })
    .then(function(res) {
      if (!res.ok) throw new Error('Diagnostic insert failed: ' + res.status);
      return res.json();
    })
    .then(function(data) {
      var submissionId = data[0].id;
      var resultPayload = buildResult(submissionId, payload);
      return fetch(SB_URL + '/rest/v1/results', {
        method:  'POST',
        headers: headers,
        body:    JSON.stringify(resultPayload)
      })
      .then(function(rr) { return rr.ok ? rr.json() : null; }, function() { return null; })
      .then(function(resData) {
        var resultId = (resData && resData[0]) ? resData[0].id : null;
        var reportPayload = {
          diagnostic_id:    submissionId,
          result_id:        resultId,
          student_id:       payload.student_id,
          student_name:     payload.student_name,
          diagnostic_label: payload.diagnostic_label,
          ai_report:        'Pending HT review',
          status:           'pending'
        };
        return fetch(SB_URL + '/rest/v1/reports', {
          method:  'POST',
          headers: headers,
          body:    JSON.stringify(reportPayload)
        });
      });
    })
    .then(function(res) {
      if (!res.ok) throw new Error('Report insert failed: ' + res.status);
      onSuccess();
    })
    .catch(function(err) {
      onError(err);
    });
  }

  /* ==========================================================
     SUBMIT BUTTON HANDLER
     ========================================================== */
  document.getElementById('btnSubmit').onclick = function() {
    var missingIds = validate();
    if (missingIds.length > 0) {
      document.getElementById('submitError').style.display = 'block';
      highlightMissing(missingIds);
      return;
    }
    document.getElementById('submitError').style.display = 'none';

    var btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    var payload = collectPayload();

    submitToSupabase(
      payload,
      function() {
        /* Success */
        document.getElementById('progressWrap').style.display = 'none';
        showScreen('screenThankYou');
        window.scrollTo(0, 0);
      },
      function(err) {
        /* Error */
        btn.disabled = false;
        btn.textContent = CONFIG.submitButtonLabel;
        var errBox = document.getElementById('submitError');
        errBox.style.display = 'block';
        errBox.textContent = 'Submission failed. Please check your connection and try again. Error: ' + err.message;
        console.error('Supabase error:', err);
      }
    );
  };

  /* ==========================================================
     HTML ESCAPE UTILITY
     Always escape user-provided content inserted into HTML.
     ========================================================== */
  function escHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ==========================================================
     INIT
     ========================================================== */
  initDisplay();

</script>
</body>
</html>
