  <style>
    :root {
      --obsidian: #0D0D0F;
      --ink: #1A1A1F;
      --slate: #4A4A56;
      --mist: #9A9AA8;
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dark: #A07820;
      --gold-pale: #F5EDDA;
      --cream: #F8F5EF;
      --cream-warm: #FAF7F0;
      --cream-deep: #F2EDE0;
      --card: #FFFEF9;
      --border-soft: #E8E4DC;
      --white: #FFFFFF;
      --error: #A32D2D;
      --error-wash: #FCEBEB;
      --font-display: 'Cormorant Garamond', 'Noto Serif TC', serif;
      --font-body: 'DM Sans', 'Noto Sans TC', sans-serif;
      --font-mono: 'SF Mono', Menlo, Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background-color: var(--cream); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
    .site-header { background-color: var(--obsidian); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .site-header .brand-logo { height: 38px; width: auto; display: block; }
    .site-header .header-eyebrow { font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light); white-space: nowrap; }
    .progress-bar-wrap { background-color: var(--obsidian); padding: 0 32px 18px; }
    .progress-track { height: 3px; background-color: rgba(250,247,240,0.14); overflow: hidden; }
    .progress-fill { height: 100%; background-color: var(--gold); transition: width 0.4s ease; }
    .progress-label { font-size: 11px; color: var(--mist); margin-top: 7px; letter-spacing: 0.06em; text-transform: uppercase; }
    .main-wrap { flex: 1; max-width: 760px; width: 100%; margin: 0 auto; padding: 48px 24px 64px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .welcome-eyebrow { font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 16px; }
    .name-screen-title { font-family: var(--font-display); font-weight: 400; font-size: 36px; color: var(--obsidian); line-height: 1.15; letter-spacing: -0.015em; margin-bottom: 12px; }
    .name-screen-desc { font-size: 16px; color: var(--slate); line-height: 1.65; margin-bottom: 36px; max-width: 560px; }
    .info-card { background-color: var(--card); border: 1px solid var(--border-soft); border-left: 3px solid var(--gold); padding: 24px 28px; margin-bottom: 32px; }
    .info-card p { font-size: 14px; color: var(--slate); line-height: 1.65; }
    .info-card p + p { margin-top: 9px; }
    .info-card strong { color: var(--ink); font-weight: 600; }
    .field-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--slate); margin-bottom: 9px; }
    .field-input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border-soft); font-family: var(--font-body); font-size: 16px; color: var(--ink); background: var(--white); outline: none; transition: border-color 0.2s; }
    .field-input:focus { border-color: var(--gold); }
    .field-error { font-size: 13px; color: var(--error); margin-top: 6px; display: none; }
    .domain-header { margin: 40px 0 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); }
    .domain-header:first-of-type { margin-top: 0; }
    .domain-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dark); font-weight: 500; margin-bottom: 6px; }
    .domain-title { font-family: var(--font-display); font-weight: 400; font-size: 24px; color: var(--obsidian); letter-spacing: -0.01em; }
    .question-card { background-color: var(--card); border: 1px solid var(--border-soft); padding: 26px; margin-bottom: 16px; }
    .question-number { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold-dark); font-weight: 500; margin-bottom: 9px; }
    .question-text { font-family: var(--font-body); font-size: 16px; line-height: 1.6; color: var(--ink); margin-bottom: 18px; }
    .question-text sup { font-size: 12px; }
    .source-block { background: var(--cream-warm); border-left: 3px solid var(--gold); padding: 22px 26px; margin: 18px 0; font-family: var(--font-display); font-weight: 400; font-size: 17px; line-height: 1.85; color: var(--ink); }
    .source-block p { margin-bottom: 14px; }
    .source-block p:last-child { margin-bottom: 0; }
    .source-block strong { font-weight: 600; }
    .source-attr { font-size: 11.5px; color: var(--slate); margin-top: 12px; font-style: italic; font-family: var(--font-body); }
    .text-after { margin: 16px 0 18px; font-size: 15px; line-height: 1.6; color: var(--ink); }
    .text-after p { margin-bottom: 8px; }
    .mcq-options { list-style: none; }
    .mcq-options li { margin-bottom: 10px; }
    .mcq-options label { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border: 1.5px solid var(--border-soft); cursor: pointer; transition: border-color 0.15s, background-color 0.15s; font-size: 15px; line-height: 1.45; color: var(--ink); }
    .mcq-options label:hover { border-color: var(--gold); background-color: var(--cream-warm); }
    .mcq-options label sup { font-size: 12px; }
    .mcq-options input[type="radio"] { display: none; }
    .mcq-options input[type="radio"]:checked + label { border-color: var(--obsidian); background-color: var(--gold-pale); font-weight: 500; }
    .option-letter { font-weight: 600; color: var(--gold-dark); flex-shrink: 0; min-width: 18px; }
    .text-response { width: 100%; min-height: 220px; padding: 13px 16px; border: 1.5px solid var(--border-soft); font-family: var(--font-body); font-size: 15px; color: var(--ink); background: var(--white); resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.55; }
    .text-response:focus { border-color: var(--gold); }
    .text-char-count { font-size: 12px; color: var(--slate); text-align: right; margin-top: 6px; }
    .scale-wrap { padding: 4px 0; }
    .scale-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--slate); margin-bottom: 12px; }
    .scale-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .scale-btn { flex: 1; min-width: 36px; max-width: 60px; aspect-ratio: 1; border: 1.5px solid var(--border-soft); background: var(--white); font-family: var(--font-body); font-size: 15px; font-weight: 500; color: var(--ink); cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; display: flex; align-items: center; justify-content: center; }
    .scale-btn:hover { border-color: var(--gold); }
    .scale-btn.selected { background-color: var(--obsidian); border-color: var(--obsidian); color: var(--cream); }
    .rank-list { list-style: none; }
    .rank-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: var(--card); border: 1.5px solid var(--border-soft); margin-bottom: 8px; font-size: 15px; color: var(--ink); user-select: none; }
    .rank-position { font-size: 12px; font-weight: 600; color: var(--gold-dark); min-width: 26px; text-align: center; }
    .rank-text { flex: 1; line-height: 1.4; }
    .rank-controls { display: flex; flex-direction: column; gap: 4px; }
    .rank-btn { background: none; border: 1px solid var(--border-soft); width: 26px; height: 22px; cursor: pointer; font-size: 11px; color: var(--slate); display: flex; align-items: center; justify-content: center; transition: background 0.1s, color 0.1s; }
    .rank-btn:hover { background: var(--obsidian); color: var(--cream); border-color: var(--obsidian); }
    .rank-btn:disabled { opacity: 0.25; cursor: default; }
    .rank-btn:disabled:hover { background: none; color: var(--slate); border-color: var(--border-soft); }
    .rank-hint { font-size: 12px; color: var(--slate); margin-top: -4px; margin-bottom: 10px; }
    .btn-primary { display: inline-block; background-color: var(--gold); color: var(--obsidian); font-family: var(--font-body); font-size: 15px; font-weight: 500; padding: 16px 38px; border: none; cursor: pointer; letter-spacing: 0.04em; transition: background-color 0.2s, transform 0.1s; }
    .btn-primary:hover { background-color: var(--gold-light); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background-color: var(--cream-deep); color: var(--mist); cursor: not-allowed; transform: none; }
    .btn-row { margin-top: 40px; display: flex; justify-content: flex-end; }
    .required-note { font-size: 13px; color: var(--slate); margin-bottom: 28px; }
    .req { color: var(--error); }
    .submit-error { background-color: var(--error-wash); border: 1px solid var(--error); padding: 14px 18px; font-size: 14px; color: var(--error); margin-top: 16px; display: none; }
    .thankyou-wrap { text-align: center; padding: 48px 0; }
    .thankyou-icon { width: 72px; height: 72px; background-color: var(--obsidian); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .thankyou-icon svg { width: 34px; height: 34px; }
    .thankyou-title { font-family: var(--font-display); font-weight: 400; font-size: 32px; color: var(--obsidian); letter-spacing: -0.01em; margin-bottom: 16px; }
    .thankyou-body { font-size: 16px; color: var(--slate); line-height: 1.7; max-width: 480px; margin: 0 auto 32px; }
    .thankyou-divider { width: 60px; height: 2px; background-color: var(--gold); margin: 28px auto; }
    .thankyou-next { font-size: 14px; color: var(--ink); font-weight: 500; }
    .site-footer { background-color: var(--obsidian); padding: 22px 32px; text-align: center; font-size: 12px; color: var(--mist); letter-spacing: 0.04em; }
    @media (max-width: 600px) { .main-wrap { padding: 32px 16px 48px; } .name-screen-title { font-size: 28px; } .scale-buttons { gap: 5px; } }
  </style>
</head>

      source: '<p><strong>The Last Morning</strong></p>'

<div class="progress-bar-wrap" id="progressWrap" style="display:none;">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">Question 0 of 0</div>
</div>

<main class="main-wrap">

  <section class="screen active" id="screenName">
    <p class="welcome-eyebrow" id="welcomeEyebrowEl"></p>
    <h1 class="name-screen-title" id="introHeadingEl"></h1>
    <p class="name-screen-desc" id="introDescEl"></p>
    <div class="info-card" id="infoCardEl"></div>
    <div style="margin-bottom: 24px;">
      <label class="field-label" for="studentName" id="nameLabelEl"></label>
      <input class="field-input" type="text" id="studentName" autocomplete="name" spellcheck="false">
      <div class="field-error" id="nameError">Please enter your name before continuing.</div>
      <div style="font-size:13px; color:var(--grey); margin-top:8px;" id="nameHintEl"></div>
    </div>
    <button class="btn-primary" id="btnStartDiagnostic">Begin Diagnostic</button>
  </section>

  <section class="screen" id="screenQuestions">
    <p class="required-note">Fields marked <span class="req">*</span> are required.</p>
    <div id="questionsContainer"></div>
    <div class="btn-row"><button class="btn-primary" id="btnSubmit"></button></div>
    <div class="submit-error" id="submitError">Please answer all required questions before submitting.</div>
  </section>

  <section class="screen" id="screenThankYou">
    <div class="thankyou-wrap">
      <div class="thankyou-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2 class="thankyou-title" id="thankyouTitleEl"></h2>
      <p class="thankyou-body" id="thankyouBodyEl"></p>
      <div class="thankyou-divider"></div>
      <p class="thankyou-next" id="thankyouNextEl"></p>
    </div>
  </section>

</main>

<footer class="site-footer">
  Harland Education &nbsp;&middot;&nbsp; Da'an District, Taipei &nbsp;&middot;&nbsp; Confidential assessment material
</footer>

<script>
  function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) { screens[i].classList.remove('active'); }
    document.getElementById(id).classList.add('active');
  }

  function initDisplay() {
    document.title = CONFIG.diagnosticTitle + ' | Harland Education';
    document.getElementById('welcomeEyebrowEl').textContent = CONFIG.diagnosticSubtitle;
    document.getElementById('introHeadingEl').textContent  = CONFIG.introHeading;
    document.getElementById('introDescEl').textContent     = CONFIG.introDescription;
    document.getElementById('nameLabelEl').textContent     = CONFIG.nameLabel;
    document.getElementById('nameHintEl').textContent      = CONFIG.nameHint;
    document.getElementById('btnSubmit').textContent       = CONFIG.submitButtonLabel;
    document.getElementById('thankyouTitleEl').textContent = CONFIG.thankyouTitle;
    document.getElementById('thankyouBodyEl').textContent  = CONFIG.thankyouBody;
    document.getElementById('thankyouNextEl').textContent  = CONFIG.thankyouNext;
    var cardEl = document.getElementById('infoCardEl');
    var cardHtml = '';
    for (var i = 0; i < CONFIG.infoPoints.length; i++) {
      cardHtml += '<p><strong>' + (i + 1) + '.</strong> ' + CONFIG.infoPoints[i] + '</p>';
    }
    cardEl.innerHTML = cardHtml;
  }

  document.getElementById('btnStartDiagnostic').onclick = function() {
    var name = document.getElementById('studentName').value.trim();
    if (!name) { document.getElementById('nameError').style.display = 'block'; document.getElementById('studentName').focus(); return; }
    document.getElementById('nameError').style.display = 'none';
    renderQuestions();
    showScreen('screenQuestions');
    document.getElementById('progressWrap').style.display = 'block';
    updateProgress();
    window.scrollTo(0, 0);
  };

  var ANSWERS = {};
  var RANKING_STATE = {};

  function renderQuestions() {
    var container = document.getElementById('questionsContainer');
    var html = '';
    var currentDomain = null;
    var qNum = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      qNum++;
      if (q.domain !== currentDomain) {
        currentDomain = q.domain;
        html += '<div class="domain-header"><div class="domain-label">Section</div><div class="domain-title">' + escHtml(q.domain) + '</div></div>';
      }
      html += '<div class="question-card" id="card_' + escHtml(q.id) + '">';
      html += '<div class="question-number">Question ' + qNum + (q.required || q.type === 'mcq' ? ' <span class="req">*</span>' : '') + '</div>';
      /* Question text -- allow HTML for emphasis and line breaks */
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.source) {
        html += '<div class="source-block">' + q.source;
        if (q.sourceAttr) { html += '<div class="source-attr">' + escHtml(q.sourceAttr) + '</div>'; }
        html += '</div>';
      }
      if (q.textAfter) {
        html += '<div class="text-after">' + q.textAfter + '</div>';
      }
      if (q.type === 'mcq')          html += renderMcq(q);
      else if (q.type === 'text')    html += renderText(q);
      else if (q.type === 'scale')   html += renderScale(q);
      else if (q.type === 'ranking') html += renderRanking(q);
      html += '</div>';
    }
    container.innerHTML = html;
    attachListeners();
  }

  function renderMcq(q) {
    var letters = ['A','B','C','D','E'];
    var html = '<ul class="mcq-options">';
    for (var i = 0; i < q.options.length; i++) {
      var iid = 'mcq_' + q.id + '_' + i;
      /* Option text -- allow HTML */
      html += '<li><input type="radio" name="mcq_' + escHtml(q.id) + '" id="' + iid + '" value="' + i + '"><label for="' + iid + '"><span class="option-letter">' + letters[i] + '</span>' + q.options[i] + '</label></li>';
    }
    html += '</ul>';
    return html;
  }

  function renderText(q) {
    var placeholder = (q.hint || '').replace(/\\n/g, '\n');
    return '<textarea class="text-response" id="txt_' + escHtml(q.id) + '" placeholder="' + escHtml(placeholder) + '" rows="10"></textarea>'
         + '<div class="text-char-count" id="cc_' + escHtml(q.id) + '">0 characters</div>';
  }

  function renderScale(q) {
    var html = '<div class="scale-wrap"><div class="scale-labels"><span>' + escHtml(q.labelLow) + '</span><span>' + escHtml(q.labelHigh) + '</span></div><div class="scale-buttons">';
    for (var v = q.min; v <= q.max; v++) {
      html += '<button type="button" class="scale-btn" data-qid="' + escHtml(q.id) + '" data-val="' + v + '">' + v + '</button>';
    }
    html += '</div></div>';
    return html;
  }

  function renderRanking(q) {
    RANKING_STATE[q.id] = q.items.slice();
    var hintText = q.rankHint || 'Use the arrows to reorder.';
    var html = '<p class="rank-hint">' + escHtml(hintText) + '</p><ul class="rank-list" id="ranklist_' + escHtml(q.id) + '">';
    for (var i = 0; i < q.items.length; i++) { html += buildRankItem(q.id, i, q.items.length, q.items[i]); }
    html += '</ul>';
    return html;
  }

  function buildRankItem(qid, idx, total, text) {
    var upDis = idx === 0 ? 'disabled' : '';
    var dnDis = idx === total - 1 ? 'disabled' : '';
    return '<li class="rank-item"><div class="rank-position">' + (idx + 1) + '</div><div class="rank-text">' + escHtml(text) + '</div>'
         + '<div class="rank-controls">'
         + '<button type="button" class="rank-btn" ' + upDis + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',-1)">&#9650;</button>'
         + '<button type="button" class="rank-btn" ' + dnDis + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',1)">&#9660;</button>'
         + '</div></li>';
  }

  function moveRankItem(qid, idx, direction) {
    var items = RANKING_STATE[qid];
    var newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= items.length) return;
    var temp = items[idx]; items[idx] = items[newIdx]; items[newIdx] = temp;
    RANKING_STATE[qid] = items;
    var listEl = document.getElementById('ranklist_' + qid);
    var html = '';
    for (var i = 0; i < items.length; i++) { html += buildRankItem(qid, i, items.length, items[i]); }
    listEl.innerHTML = html;
    updateProgress();
  }

  function attachListeners() {
    var radios = document.querySelectorAll('.mcq-options input[type="radio"]');
    for (var i = 0; i < radios.length; i++) {
      radios[i].onchange = function() { ANSWERS[this.name.replace('mcq_', '')] = parseInt(this.value, 10); updateProgress(); };
    }
    var textareas = document.querySelectorAll('.text-response');
    for (var j = 0; j < textareas.length; j++) {
      (function(ta) {
        var qid = ta.id.replace('txt_', '');
        ta.oninput = function() {
          ANSWERS[qid] = ta.value;
          var cc = document.getElementById('cc_' + qid);
          if (cc) cc.textContent = ta.value.length + ' characters';
          updateProgress();
        };
      })(textareas[j]);
    }
    var scaleBtns = document.querySelectorAll('.scale-btn');
    for (var k = 0; k < scaleBtns.length; k++) {
      scaleBtns[k].onclick = function() {
        var qid = this.getAttribute('data-qid');
        var val = parseInt(this.getAttribute('data-val'), 10);
        ANSWERS[qid] = val;
        var siblings = document.querySelectorAll('.scale-btn[data-qid="' + qid + '"]');
        for (var s = 0; s < siblings.length; s++) { siblings[s].classList.remove('selected'); }
        this.classList.add('selected');
        updateProgress();
      };
    }
  }

  function countRequired() {
    var total = 0; var answered = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (!q.required && q.type !== 'mcq') continue;
      total++;
      if (q.type === 'mcq' && typeof ANSWERS[q.id] !== 'undefined') answered++;
      else if (q.type === 'text' && ANSWERS[q.id] && ANSWERS[q.id].length >= 1) answered++;
      else if (q.type === 'scale' && typeof ANSWERS[q.id] !== 'undefined') answered++;
      else if (q.type === 'ranking') answered++;
    }
    return { total: total, answered: answered };
  }

  function updateProgress() {
    var counts = countRequired();
    var pct = counts.total > 0 ? Math.round((counts.answered / counts.total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = counts.answered + ' of ' + counts.total + ' required questions answered';
  }

  function validate() {
    var missing = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (q.type === 'mcq') { if (typeof ANSWERS[q.id] === 'undefined') missing.push(q.id); }
      else if (q.type === 'text' && q.required) { var v = ANSWERS[q.id] || ''; if (v.length < 1) missing.push(q.id); }
      else if (q.type === 'scale' && q.required) { if (typeof ANSWERS[q.id] === 'undefined') missing.push(q.id); }
    }
    return missing;
  }

  function highlightMissing(missingIds) {
    var allCards = document.querySelectorAll('.question-card');
    for (var i = 0; i < allCards.length; i++) { allCards[i].style.borderColor = ''; }
    for (var j = 0; j < missingIds.length; j++) { var card = document.getElementById('card_' + missingIds[j]); if (card) card.style.borderColor = '#A32D2D'; }
    if (missingIds.length > 0) { var first = document.getElementById('card_' + missingIds[0]); if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }

  function collectPayload() {
    var studentName = document.getElementById('studentName').value.trim();
    var mcqScores = {}; var selfRatings = {}; var preferences = {}; var rawResponses = {};
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (q.type === 'mcq') {
        var chosen = ANSWERS[q.id];
        mcqScores[q.id] = { chosen: chosen, answer: q.answer, correct: (q.answer !== null && q.answer !== undefined) ? (chosen === q.answer) : null };
        rawResponses[q.id] = chosen;
      } else if (q.type === 'text') {
        rawResponses[q.id] = ANSWERS[q.id] || '';
      } else if (q.type === 'scale') {
        selfRatings[q.id] = ANSWERS[q.id];
        rawResponses[q.id] = ANSWERS[q.id];
      } else if (q.type === 'ranking') {
        var order = RANKING_STATE[q.id] || [];
        preferences[q.id] = order;
        rawResponses[q.id] = order;
      }
    }

    /* Level profile engine.
       Every auto-scored item carries strand (Reading/Grammar/Vocabulary) and
       level (5/6/7). Per strand, the indicated level is the HIGHEST level L
       such that performance on all items at level <= L is at least 70%.
       Below 70% on Level 5 items alone reads as below band; clearing Level 7
       with 75%+ on the Level 7 items alone adds a possibly-above-band flag.
       The band commits to Levels 5-7 only. The writing sample is teacher-
       scored, and the teacher sets the final level. */
    var strandNames = ['Reading', 'Grammar', 'Vocabulary'];
    var levelKeys = ['Level 5', 'Level 6', 'Level 7'];
    var byStrand = {};
    var si;
    for (si = 0; si < strandNames.length; si++) {
      byStrand[strandNames[si]] = {
        'Level 5': { correct: 0, total: 0 },
        'Level 6': { correct: 0, total: 0 },
        'Level 7': { correct: 0, total: 0 },
        overall: { correct: 0, total: 0 }
      };
    }
    var byTopic = {};
    for (var m = 0; m < QUESTIONS.length; m++) {
      var qq = QUESTIONS[m];
      if (qq.type !== 'mcq' || !qq.strand || !qq.level) continue;
      var rec = byStrand[qq.strand];
      if (!rec) continue;
      var lk = 'Level ' + qq.level;
      var isCorrect = (mcqScores[qq.id] && mcqScores[qq.id].correct === true);
      rec[lk].total++;
      rec.overall.total++;
      if (isCorrect) { rec[lk].correct++; rec.overall.correct++; }
      byTopic[qq.strand + ' :: ' + lk + ' :: ' + (qq.topic || qq.id)] = isCorrect ? 'correct' : 'incorrect';
    }

    var strandLevels = {};
    for (si = 0; si < strandNames.length; si++) {
      var sname = strandNames[si];
      var srec = byStrand[sname];
      var cumC = 0; var cumT = 0;
      var indicated = 'Below Level 5 (below band)';
      for (var li = 0; li < levelKeys.length; li++) {
        var own = srec[levelKeys[li]];
        cumC += own.correct;
        cumT += own.total;
        var cumOk = cumT > 0 && (cumC / cumT) >= 0.7;
        var ownOk = own.total > 0 && (own.correct / own.total) >= 0.5;
        if (cumOk && ownOk) { indicated = levelKeys[li]; }
        else { break; }
      }
      if (indicated === 'Level 7') {
        var l7 = srec['Level 7'];
        if (l7.total > 0 && (l7.correct / l7.total) >= 0.75) {
          indicated = 'Level 7 (possibly above band, consider the Grade 8-10 diagnostic)';
        }
      }
      strandLevels[sname] = indicated;
    }

    preferences.level_analysis = {
      band: 'Grade 5-7 band, resolves Levels 5, 6, and 7 only',
      by_strand: byStrand,
      by_topic: byTopic,
      strand_levels: strandLevels,
      writing_sample: 'Not auto-scored. The written response in raw_responses (w1_persuasive) should be assessed against the Harland writing strand: Level 5 comparative paragraphs, Level 6 persuasive essays, Level 7 descriptive essays. Look at organization (paragraph vs multi-paragraph), thesis and reasons, transitions, and sentence control.',
      note: 'Indicated levels are guidance from a small item sample (Reading 10, Grammar 9, Vocabulary 9 items), not an automatic placement. A strand level is the highest level at which cumulative performance (that level and below) is at least 70% AND at least half of that level&#39;s own items are correct. Per Harland practice, the teacher reviews this profile together with the writing sample and sets the final level. Below-band and above-band performance is reported as a flag, never as a committed level.'
    };

    return {
      student_id: STUDENT_ID, student_name: studentName,
      diagnostic_type: DIAGNOSTIC_TYPE, diagnostic_label: DIAGNOSTIC_LABEL,
      raw_responses: rawResponses, mcq_scores: mcqScores,
      self_ratings: selfRatings, preferences: preferences
    };
  }

  function submitToSupabase(payload, onSuccess, onError) {
    var headers = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Prefer': 'return=representation' };
    fetch(SB_URL + '/rest/v1/diagnostics', { method: 'POST', headers: headers, body: JSON.stringify(payload) })
    .then(function(res) { if (!res.ok) throw new Error('Insert failed: ' + res.status); return res.json(); })
    .then(function(data) {
      var reportPayload = {
        diagnostic_id: data[0].id,
        student_id: payload.student_id,
        student_name: payload.student_name,
        diagnostic_label: payload.diagnostic_label,
        ai_report: 'Pending HT review',
        status: 'pending'
      };
      return fetch(SB_URL + '/rest/v1/reports', { method: 'POST', headers: headers, body: JSON.stringify(reportPayload) });
    })
    .then(function(res) { if (!res.ok) throw new Error('Report insert failed: ' + res.status); onSuccess(); })
    .catch(function(err) { onError(err); });
  }

  document.getElementById('btnSubmit').onclick = function() {
    var missingIds = validate();
    if (missingIds.length > 0) { document.getElementById('submitError').style.display = 'block'; highlightMissing(missingIds); return; }
    document.getElementById('submitError').style.display = 'none';
    var btn = document.getElementById('btnSubmit');
    btn.disabled = true; btn.textContent = 'Submitting...';
    submitToSupabase(collectPayload(),
      function() { document.getElementById('progressWrap').style.display = 'none'; showScreen('screenThankYou'); window.scrollTo(0, 0); },
      function(err) { btn.disabled = false; btn.textContent = CONFIG.submitButtonLabel; var errBox = document.getElementById('submitError'); errBox.style.display = 'block'; errBox.textContent = 'Submission failed. Please check your connection and try again. Error: ' + err.message; }
    );
  };

  function escHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  initDisplay();
</script>
